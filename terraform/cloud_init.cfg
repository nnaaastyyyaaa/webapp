#cloud-config
hostname: ${hostname}
manage_etc_hosts: true

users:
  - name: ansible
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_key}

ssh_pwauth: false
disable_root: true

package_update: true

runcmd:
  - systemctl enable ssh
  - systemctl restart ssh
  - systemctl enable serial-getty@ttyS0.service
  - systemctl start serial-getty@ttyS0.service