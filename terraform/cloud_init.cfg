#cloud-config
hostname: ${hostname}
manage_etc_hosts: true

users:
  - name: ansible
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ${ssh_key}

ssh_pwauth: false
disable_root: true

package_update: true
packages:
  - openssh-server

runcmd:
  - apt-get install -y openssh-server
  - systemctl enable ssh
  - systemctl restart ssh

bootcmd:
  - systemctl enable serial-getty@ttyS0.service
  - systemctl start serial-getty@ttyS0.service
  - echo "console=ttyS0" >> /etc/default/grub || true